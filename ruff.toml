# Exclude a variety of commonly ignored directories.
# Copied from default configuration.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

# List of project-specific excludes.
extend-exclude = [
    # Exclude variations on virtualenv directories.
    "*venv*",
]

# Project-specific line-length.
line-length = 120

# Project-specific indent-width.
indent-width = 4

# Assume Python 3.11.
target-version = "py311"

[lint]
# Enable specific rule-sets. See https://docs.astral.sh/ruff/rules/ for documentation.
select = [
    # Pylint: Static code analysis including errors, warnings, convention mismatches and refactor suggestions.
    "PLE",
    "PLC",

]
ignore = [
    # Pylint: Collection of rules against having too many of something (statements, parameters, branches, much more).
    # The rules themselves are not intelligent in any way:
    # they will just reject any code with more than 5 parameters for instance.
    # Disabled because we do not want to put (configurable) arbitrary limits on our code.
    "PLR09",
    # Pylint: import-outside-top-level
    # We import outside the top level to reduce required dependencies and reduce import load.
    "PLC0415",
]

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

# Enable `from __future__ import annotations` imports to alleviate the need for string-typing.
future-annotations = true

# Disable `typing_extensions` imports, as we do not have it as a dependency.
typing-extensions = false

[format]
# As we use a combination of double and single quotes, we preserve the quote style.
quote-style = "preserve"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Use Unix-style line-endings.
line-ending = "lf"

# Enable auto-formatting of code examples in docstrings. Markdown,
# reStructuredText code/literal blocks and doctests are all supported.
docstring-code-format = true

# Set the line length limit used when formatting code snippets in
# docstrings.
#
# This only has an effect when the `docstring-code-format` setting is
# enabled.
docstring-code-line-length = "dynamic"
