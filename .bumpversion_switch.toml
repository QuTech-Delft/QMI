[tool.bumpversion]
current_version = "0.53.0-beta.0"
commit = false
tag = false
parse = "(?P<major>\\d+)\\.(?P<minor>\\d+)\\.(?P<patch>\\d+)(\\-(?P<release>[a-z]+))?(\\.(?P<build>\\d+))?"
serialize = [
    "{major}.{minor}.{patch}-{release}.{build}",
    "{major}.{minor}.{patch}"
]

[tool.bumpversion.parts.release]
optional_value = "gamma"
first_value = "beta"
values = [
    "beta",
    "gamma"
]

[[tool.bumpversion.files]]
filename = "README.md"
serialize = "{major}-{minor}"
search = "main"
replace = "stable-{new_version}"

[[tool.bumpversion.files]]
filename = ".bumpversion_stable.cfg"
serialize = "{major}-{minor}"
search = "main"
replace = "stable-{new_version}"

[[tool.bumpversion.files]]
filename = ".bumpversion_release.cfg"
serialize = "{major}-{minor}"
search = "main"
replace = "stable-{new_version}"

[[tool.bumpversion.files]]
filename = "pyproject.toml"
serialize = "{major}-{minor}"
search = "main"
replace = "stable-{new_version}"
